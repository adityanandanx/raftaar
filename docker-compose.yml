version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: raftaar-postgres
    environment:
      POSTGRES_USER: raftaar
      POSTGRES_PASSWORD: raftaar
      POSTGRES_DB: raftaar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raftaar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: raftaar-backend
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://raftaar:raftaar@postgres:5432/raftaar
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
