# This is the Alembic environment configuration file
# See the Alembic documentation for more details
[alembic]
script_location = migrations
sqlalchemy.url = driver://user:password@localhost/dbname
version_location_name = versions
version_path_separator = /

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
